<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خمّن الكلمة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a28;
    --border: #2a2a45;
    --gold: #f5c842;
    --gold2: #e8a020;
    --team1: #00d4ff;
    --team2: #ff4d6d;
    --text: #f0f0ff;
    --muted: #6a6a9a;
    --green: #00e676;
    --glow1: rgba(0,212,255,0.15);
    --glow2: rgba(255,77,109,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(0,212,255,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(255,77,109,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 80%, rgba(245,200,66,0.03) 0%, transparent 50%);
  }

  /* ===== STARS BACKGROUND ===== */
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 25%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 90%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(2px 2px at 70% 10%, rgba(245,200,66,0.5) 0%, transparent 100%),
      radial-gradient(2px 2px at 15% 40%, rgba(0,212,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 80%, rgba(255,77,109,0.4) 0%, transparent 100%);
  }

  /* ===== SCREENS ===== */
  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: flex; flex-direction: column; min-height: 100vh; }

  /* ===== SETUP SCREEN ===== */
  #setup-screen {
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .logo-section {
    text-align: center;
    margin-bottom: 50px;
    animation: fadeInDown 0.8s ease;
  }

  .logo-icon {
    font-size: 80px;
    display: block;
    margin-bottom: 16px;
    filter: drop-shadow(0 0 30px rgba(245,200,66,0.5));
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .logo-title {
    font-family: 'Tajawal', sans-serif;
    font-size: 56px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold) 0%, #fff 50%, var(--gold2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.1;
    letter-spacing: -1px;
  }

  .logo-sub {
    color: var(--muted);
    font-size: 16px;
    margin-top: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .setup-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px;
    width: 100%;
    max-width: 560px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    animation: fadeInUp 0.8s ease 0.2s both;
  }

  .teams-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 30px;
  }

  .team-input-group { position: relative; }

  .team-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .team-label.t1 { color: var(--team1); }
  .team-label.t2 { color: var(--team2); }

  .team-input {
    width: 100%;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 16px;
    font-family: 'Cairo', sans-serif;
    color: var(--text);
    transition: all 0.3s;
    text-align: center;
  }

  .team-input.t1:focus { border-color: var(--team1); box-shadow: 0 0 0 4px rgba(0,212,255,0.1); outline: none; }
  .team-input.t2:focus { border-color: var(--team2); box-shadow: 0 0 0 4px rgba(255,77,109,0.1); outline: none; }

  .vs-divider {
    text-align: center;
    font-size: 24px;
    font-weight: 900;
    color: var(--gold);
    margin: 10px 0 30px;
    text-shadow: 0 0 20px rgba(245,200,66,0.5);
  }

  .btn-start {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
    color: #000;
    font-size: 20px;
    font-weight: 900;
    font-family: 'Cairo', sans-serif;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 1px;
    box-shadow: 0 8px 30px rgba(245,200,66,0.3);
  }

  .btn-start:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(245,200,66,0.5);
  }

  .btn-start:active { transform: translateY(0); }

  /* ===== GAME SCREEN ===== */
  #game-screen { padding: 0; }

  .scoreboard {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .team-score {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .team-score.right { justify-content: flex-end; }

  .score-name {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .score-points {
    font-size: 36px;
    font-weight: 900;
    font-family: 'Tajawal', sans-serif;
    line-height: 1;
    transition: all 0.5s;
  }

  .score-points.t1 { color: var(--team1); text-shadow: 0 0 20px rgba(0,212,255,0.4); }
  .score-points.t2 { color: var(--team2); text-shadow: 0 0 20px rgba(255,77,109,0.4); }

  .score-indicator {
    width: 10px; height: 10px;
    border-radius: 50%;
    animation: pulse-dot 2s infinite;
  }
  .score-indicator.t1 { background: var(--team1); box-shadow: 0 0 10px var(--team1); }
  .score-indicator.t2 { background: var(--team2); box-shadow: 0 0 10px var(--team2); }

  @keyframes pulse-dot {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .mid-info {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
  }

  .mid-info strong {
    display: block;
    font-size: 18px;
    color: var(--gold);
    font-weight: 900;
  }

  /* GAME CONTENT */
  .game-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
  }

  .question-header {
    text-align: center;
    margin-bottom: 30px;
  }

  .question-counter {
    display: inline-block;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 20px;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* POINTS DISPLAY */
  .points-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
  }

  .points-value {
    font-family: 'Tajawal', sans-serif;
    font-size: 72px;
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 40px rgba(245,200,66,0.5);
    line-height: 1;
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .points-label {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* IMAGES GRID */
  .images-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 800px;
    margin-bottom: 24px;
  }

  .img-cell {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    aspect-ratio: 4/3;
    border: 2px solid var(--border);
    background: var(--card);
    transition: all 0.5s;
  }

  .img-cell.revealed {
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(245,200,66,0.2);
  }

  .img-cell img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .img-overlay {
    position: absolute;
    inset: 0;
    background: var(--card);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
    transition: all 0.5s;
    z-index: 2;
  }

  .img-overlay.hidden-overlay {
    background: linear-gradient(135deg, #1a1a28 0%, #0f0f1a 100%);
  }

  .img-overlay.visible-overlay { opacity: 0; pointer-events: none; }

  .img-number {
    font-size: 40px;
    font-weight: 900;
    color: var(--muted);
    font-family: 'Tajawal', sans-serif;
  }

  .img-lock { font-size: 30px; }

  /* TIMER SECTION */
  .timer-section {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 24px;
    width: 100%;
    max-width: 800px;
  }

  .timer-label { font-size: 13px; color: var(--muted); white-space: nowrap; }

  .timer-bar-wrap {
    flex: 1;
    height: 8px;
    background: var(--surface);
    border-radius: 100px;
    overflow: hidden;
  }

  .timer-bar {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, var(--gold2), var(--gold));
    transition: width 1s linear, background 1s;
    box-shadow: 0 0 10px rgba(245,200,66,0.4);
  }

  .timer-bar.warning {
    background: linear-gradient(90deg, #ff6b35, var(--team2));
    box-shadow: 0 0 10px rgba(255,77,109,0.4);
  }

  .timer-count {
    font-size: 22px;
    font-weight: 900;
    font-family: 'Tajawal', sans-serif;
    color: var(--gold);
    min-width: 32px;
    text-align: center;
    transition: color 0.3s;
  }

  .timer-count.warning { color: var(--team2); }

  /* REVEAL BUTTON */
  .reveal-btn {
    padding: 12px 28px;
    background: transparent;
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-size: 14px;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    transition: all 0.3s;
    white-space: nowrap;
  }

  .reveal-btn:not(:disabled):hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(245,200,66,0.05);
  }

  .reveal-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ANSWER SECTION */
  .answer-section {
    width: 100%;
    max-width: 800px;
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  .answer-wrap { position: relative; flex: 1; }

  .answer-input {
    width: 100%;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    font-size: 18px;
    font-family: 'Cairo', sans-serif;
    color: var(--text);
    transition: all 0.3s;
    text-align: right;
  }

  .answer-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 4px rgba(245,200,66,0.1);
    outline: none;
  }

  .answer-input::placeholder { color: var(--muted); }

  .btn-answer {
    padding: 18px 32px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
    color: #000;
    font-size: 18px;
    font-weight: 900;
    font-family: 'Cairo', sans-serif;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.3s;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(245,200,66,0.3);
  }

  .btn-answer:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(245,200,66,0.4);
  }

  /* TEAM BUTTONS */
  .team-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 800px;
    margin-top: 14px;
  }

  .btn-team {
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Cairo', sans-serif;
    border: 2px solid;
    cursor: pointer;
    transition: all 0.3s;
    background: transparent;
  }

  .btn-team.t1 {
    border-color: var(--team1);
    color: var(--team1);
  }
  .btn-team.t1:hover {
    background: var(--glow1);
    box-shadow: 0 0 20px rgba(0,212,255,0.2);
  }

  .btn-team.t2 {
    border-color: var(--team2);
    color: var(--team2);
  }
  .btn-team.t2:hover {
    background: var(--glow2);
    box-shadow: 0 0 20px rgba(255,77,109,0.2);
  }

  /* RESULT OVERLAY */
  .result-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    animation: fadeIn 0.3s ease;
  }

  .result-card {
    background: var(--card);
    border-radius: 28px;
    padding: 50px 60px;
    text-align: center;
    max-width: 500px;
    width: 90%;
    border: 1px solid var(--border);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .result-emoji { font-size: 80px; display: block; margin-bottom: 20px; }
  .result-title { font-size: 28px; font-weight: 900; margin-bottom: 10px; }
  .result-sub { color: var(--muted); font-size: 16px; margin-bottom: 30px; }
  .result-points {
    font-size: 64px;
    font-weight: 900;
    font-family: 'Tajawal', sans-serif;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(245,200,66,0.5);
    margin-bottom: 30px;
    display: block;
  }

  .btn-next {
    padding: 16px 40px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
    color: #000;
    font-size: 18px;
    font-weight: 900;
    font-family: 'Cairo', sans-serif;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 8px 30px rgba(245,200,66,0.3);
  }

  .btn-next:hover { transform: translateY(-2px); }

  /* FINAL SCREEN */
  #final-screen {
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    text-align: center;
  }

  .trophy { font-size: 100px; animation: float 3s ease-in-out infinite; display: block; margin-bottom: 20px; }

  .winner-title {
    font-size: 18px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .winner-name {
    font-family: 'Tajawal', sans-serif;
    font-size: 60px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold) 0%, #fff 50%, var(--gold2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 40px;
  }

  .final-scores {
    display: flex;
    gap: 30px;
    justify-content: center;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }

  .final-score-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 30px 40px;
    min-width: 160px;
  }

  .final-score-card .name { font-size: 14px; color: var(--muted); margin-bottom: 8px; }
  .final-score-card .pts { font-size: 48px; font-weight: 900; font-family: 'Tajawal', sans-serif; }
  .final-score-card.winner { border-color: var(--gold); box-shadow: 0 0 30px rgba(245,200,66,0.15); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 14px 28px;
    font-size: 15px;
    font-weight: 700;
    z-index: 300;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.correct { border-color: var(--green); color: var(--green); }
  .toast.wrong { border-color: var(--team2); color: var(--team2); }

  /* CONFETTI */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 999;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ANIMATIONS */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

  @keyframes scoreUp {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  .score-bump { animation: scoreUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

  /* LOADING */
  .loading-screen {
    position: fixed; inset: 0; z-index: 500;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 20px;
  }
  .loading-spinner {
    width: 50px; height: 50px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .score-zero { opacity: 0.4; }

  /* HINT */
  .hint-badge {
    display: inline-block;
    background: rgba(245,200,66,0.1);
    border: 1px solid rgba(245,200,66,0.3);
    border-radius: 100px;
    padding: 5px 16px;
    font-size: 13px;
    color: var(--gold);
    margin-top: 8px;
  }

  .admin-link {
    position: fixed;
    bottom: 20px;
    left: 20px;
    font-size: 11px;
    color: var(--border);
    text-decoration: none;
    z-index: 10;
    transition: color 0.3s;
  }
  .admin-link:hover { color: var(--muted); }

  /* SKIP BUTTON */
  .btn-skip {
    padding: 12px 28px;
    background: transparent;
    border: 2px solid #ff6b35;
    border-radius: 12px;
    color: #ff6b35;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 14px;
  }
  .btn-skip:hover {
    background: rgba(255,107,53,0.1);
    box-shadow: 0 0 20px rgba(255,107,53,0.2);
    transform: translateY(-1px);
  }

  /* SKIP RESULT CARD */
  .result-card.skipped { border-color: rgba(255,107,53,0.4); }
  .result-card.skipped .result-emoji-skip { font-size: 70px; display: block; margin-bottom: 16px; }
  .skip-answer-reveal {
    background: rgba(245,200,66,0.08);
    border: 1px solid rgba(245,200,66,0.3);
    border-radius: 16px;
    padding: 20px 30px;
    margin: 16px 0 24px;
  }
  .skip-answer-label { font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .skip-answer-text {
    font-size: 36px;
    font-weight: 900;
    font-family: 'Tajawal', sans-serif;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(245,200,66,0.4);
  }
</style>
</head>
<body>

<div class="stars"></div>

<!-- LOADING -->
<div class="loading-screen" id="loading">
  <div class="loading-spinner"></div>
  <div style="color: var(--muted); font-size: 14px;">جاري التحميل...</div>
</div>

<!-- SETUP SCREEN -->
<div class="screen" id="setup-screen">
  <div class="logo-section">
    <span class="logo-icon">🔍</span>
    <h1 class="logo-title">خمّن الكلمة</h1>
    <p class="logo-sub">من الصور</p>
  </div>

  <div class="setup-card">
    <div class="teams-grid">
      <div class="team-input-group">
        <label class="team-label t1">⚡ الفريق الأول</label>
        <input class="team-input t1" id="team1-input" type="text" placeholder="اسم الفريق" value="الفريق الأول">
      </div>
      <div class="team-input-group">
        <label class="team-label t2">🔥 الفريق الثاني</label>
        <input class="team-input t2" id="team2-input" type="text" placeholder="اسم الفريق" value="الفريق الثاني">
      </div>
    </div>

    <div class="vs-divider">⚔️ VS ⚔️</div>

    <button class="btn-start" onclick="startGame()">🚀 ابدأ اللعبة</button>
  </div>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="game-screen">

  <div class="scoreboard">
    <div class="team-score">
      <div class="score-indicator t1"></div>
      <div>
        <div class="score-name" id="score-name1" style="color:var(--team1)">الفريق الأول</div>
        <div class="score-points t1" id="score1">0</div>
      </div>
    </div>

    <div class="mid-info">
      <strong id="mid-q">1 / 30</strong>
      <span>سؤال</span>
    </div>

    <div class="team-score right">
      <div>
        <div class="score-name" id="score-name2" style="color:var(--team2); text-align:right">الفريق الثاني</div>
        <div class="score-points t2" id="score2">0</div>
      </div>
      <div class="score-indicator t2"></div>
    </div>
  </div>

  <div class="game-content">
    <div class="question-header">
      <div class="question-counter" id="q-counter">السؤال 1 من 30</div>
      <div id="hint-area"></div>
    </div>

    <div class="points-display">
      <div>
        <div class="points-value" id="cur-points">200</div>
        <div class="points-label">نقطة للإجابة الصحيحة</div>
      </div>
    </div>

    <div class="images-grid" id="images-grid">
      <div class="img-cell" id="cell-0">
        <img id="img-0" src="" alt="">
        <div class="img-overlay hidden-overlay" id="overlay-0">
          <div class="img-number">1</div>
          <div class="img-lock">🔒</div>
        </div>
      </div>
      <div class="img-cell" id="cell-1">
        <img id="img-1" src="" alt="">
        <div class="img-overlay hidden-overlay" id="overlay-1">
          <div class="img-number">2</div>
          <div class="img-lock">🔒</div>
        </div>
      </div>
      <div class="img-cell" id="cell-2">
        <img id="img-2" src="" alt="">
        <div class="img-overlay hidden-overlay" id="overlay-2">
          <div class="img-number">3</div>
          <div class="img-lock">🔒</div>
        </div>
      </div>
      <div class="img-cell" id="cell-3">
        <img id="img-3" src="" alt="">
        <div class="img-overlay hidden-overlay" id="overlay-3">
          <div class="img-number">4</div>
          <div class="img-lock">🔒</div>
        </div>
      </div>
    </div>

    <div class="timer-section">
      <span class="timer-label">⏱ الصورة التالية بعد</span>
      <div class="timer-bar-wrap">
        <div class="timer-bar" id="timer-bar"></div>
      </div>
      <div class="timer-count" id="timer-count">30</div>
      <button class="reveal-btn" id="reveal-btn" onclick="revealNextImage()">كشف صورة ◀</button>
    </div>

    <div class="answer-section">
      <div class="answer-wrap">
        <input class="answer-input" id="answer-input" type="text"
          placeholder="اكتب إجابتك هنا..." autocomplete="off"
          onkeydown="if(event.key==='Enter') showTeamSelect()">
      </div>
      <button class="btn-answer" onclick="showTeamSelect()">✓ تأكيد</button>
    </div>

    <div class="team-btns" id="team-btns" style="display:none">
      <button class="btn-team t1" id="btn-t1" onclick="submitAnswer(1)">✓ <span id="btn-t1-name">الفريق الأول</span> أجاب</button>
      <button class="btn-team t2" id="btn-t2" onclick="submitAnswer(2)">✓ <span id="btn-t2-name">الفريق الثاني</span> أجاب</button>
    </div>

    <button class="btn-skip" id="skip-btn" onclick="skipQuestion()">⏭ تخطي السؤال</button>

  </div>
</div>

<!-- FINAL SCREEN -->
<div class="screen" id="final-screen">
  <span class="trophy">🏆</span>
  <div class="winner-title">الفائز</div>
  <div class="winner-name" id="winner-name">—</div>
  <div class="final-scores">
    <div class="final-score-card" id="final-card1">
      <div class="name" id="final-name1">الفريق الأول</div>
      <div class="pts t1" id="final-pts1" style="color:var(--team1)">0</div>
    </div>
    <div class="final-score-card" id="final-card2">
      <div class="name" id="final-name2">الفريق الثاني</div>
      <div class="pts t2" id="final-pts2" style="color:var(--team2)">0</div>
    </div>
  </div>
  <button class="btn-start" style="max-width:300px" onclick="resetGame()">🔄 لعبة جديدة</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ADMIN LINK -->
<a href="admin.html" class="admin-link">⚙</a>

<script>
const SUPABASE_URL = 'https://xeukoqidoapdelgvxavl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhldWtvcWlkb2FwZGVsZ3Z4YXZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MzM2OTksImV4cCI6MjA5NjQwOTY5OX0.yRLUSTZYBOVIOZqIV4EDPerrbx5LexzmjKd4z9xjYPk';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===== STATE =====
let questions = [];
let currentIndex = 0;
let shownImages = 1;
let timerInterval = null;
let timerSecs = 30;
let sessionId = null;
let pendingAnswer = '';

let game = {
  team1: 'الفريق الأول',
  team2: 'الفريق الثاني',
  score1: 0,
  score2: 0,
};

const POINTS = [200, 150, 100, 50];

// ===== INIT =====
async function init() {
  const { data, error } = await sb.from('questions').select('*').eq('active', true).order('id');
  document.getElementById('loading').style.display = 'none';

  if (error || !data || data.length === 0) {
    showScreen('setup-screen');
    showToast('⚠️ لا توجد أسئلة! أضف أسئلة من لوحة الأدمن', 'wrong');
    questions = getSampleQuestions();
  } else {
    questions = shuffle(data);
  }
  showScreen('setup-screen');
}

function getSampleQuestions() {
  return [
    { id: 1, answer: 'تجريبي', hint: 'سؤال تجريبي', image1: 'https://picsum.photos/seed/1/400/300', image2: 'https://picsum.photos/seed/2/400/300', image3: 'https://picsum.photos/seed/3/400/300', image4: 'https://picsum.photos/seed/4/400/300' }
  ];
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===== SCREENS =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== GAME START =====
async function startGame() {
  game.team1 = document.getElementById('team1-input').value || 'الفريق الأول';
  game.team2 = document.getElementById('team2-input').value || 'الفريق الثاني';
  game.score1 = 0;
  game.score2 = 0;
  currentIndex = 0;

  // Create session
  const { data: sess } = await sb.from('game_sessions').insert({
    team1_name: game.team1,
    team2_name: game.team2,
    status: 'playing',
    question_order: questions.map(q => String(q.id))
  }).select().single();

  if (sess) sessionId = sess.id;

  updateScoreboard();
  showScreen('game-screen');
  loadQuestion();
}

// ===== LOAD QUESTION =====
function loadQuestion() {
  if (currentIndex >= questions.length) {
    endGame();
    return;
  }

  const q = questions[currentIndex];
  shownImages = 1;
  pendingAnswer = '';
  document.getElementById('team-btns').style.display = 'none';
  document.getElementById('answer-input').value = '';

  // Counter
  const total = questions.length;
  document.getElementById('q-counter').textContent = `السؤال ${currentIndex + 1} من ${total}`;
  document.getElementById('mid-q').textContent = `${currentIndex + 1} / ${total}`;

  // Hint
  const hintArea = document.getElementById('hint-area');
  hintArea.innerHTML = q.hint ? `<div class="hint-badge">💡 ${q.hint}</div>` : '';

  // Points
  updatePoints();

  // Images — reset all to hidden first
  ['img-0','img-1','img-2','img-3'].forEach((id, i) => {
    document.getElementById(id).src = [q.image1, q.image2, q.image3, q.image4][i];
    const overlay = document.getElementById(`overlay-${i}`);
    overlay.className = 'img-overlay hidden-overlay';
    document.getElementById(`cell-${i}`).classList.remove('revealed');
  });

  // Reveal first image
  revealImage(0);

  // Start timer
  startTimer();
}

function revealImage(index) {
  const overlay = document.getElementById(`overlay-${index}`);
  overlay.className = 'img-overlay visible-overlay';
  document.getElementById(`cell-${index}`).classList.add('revealed');
  shownImages = index + 1;
  updatePoints();

  // Disable reveal if all shown
  document.getElementById('reveal-btn').disabled = shownImages >= 4;
}

function revealNextImage() {
  if (shownImages < 4) {
    revealImage(shownImages);
    resetTimer();
  }
}

function updatePoints() {
  const pts = POINTS[shownImages - 1] || 50;
  const el = document.getElementById('cur-points');
  el.textContent = pts;
  el.style.color = pts === 200 ? 'var(--gold)' : pts === 150 ? '#a0e0ff' : pts === 100 ? '#ffaa55' : 'var(--team2)';
}

// ===== TIMER =====
function startTimer() {
  clearInterval(timerInterval);
  timerSecs = 30;
  updateTimerUI();

  timerInterval = setInterval(() => {
    timerSecs--;
    updateTimerUI();
    if (timerSecs <= 0) {
      clearInterval(timerInterval);
      if (shownImages < 4) {
        revealNextImage();
      }
    }
  }, 1000);
}

function resetTimer() {
  if (shownImages < 4) {
    clearInterval(timerInterval);
    startTimer();
  }
}

function updateTimerUI() {
  const pct = (timerSecs / 30) * 100;
  const bar = document.getElementById('timer-bar');
  const count = document.getElementById('timer-count');
  bar.style.width = pct + '%';
  const warn = timerSecs <= 10;
  bar.className = 'timer-bar' + (warn ? ' warning' : '');
  count.className = 'timer-count' + (warn ? ' warning' : '');
  count.textContent = timerSecs;
}

// ===== ANSWER =====
function showTeamSelect() {
  const val = document.getElementById('answer-input').value.trim();
  if (!val) { showToast('اكتب الإجابة أولاً!', 'wrong'); return; }
  pendingAnswer = val;

  document.getElementById('btn-t1-name').textContent = game.team1;
  document.getElementById('btn-t2-name').textContent = game.team2;
  document.getElementById('team-btns').style.display = 'grid';
}

function normalize(str) {
  return str.trim()
    .replace(/[أإآا]/g, 'ا')
    .replace(/[ةه]/g, 'ه')
    .replace(/ى/g, 'ي')
    .replace(/\s+/g, ' ')
    .toLowerCase();
}

async function submitAnswer(team) {
  const q = questions[currentIndex];
  const correct = normalize(pendingAnswer) === normalize(q.answer);
  const pts = correct ? POINTS[shownImages - 1] : 0;

  clearInterval(timerInterval);

  if (correct) {
    if (team === 1) { game.score1 += pts; animateScore('score1'); }
    else { game.score2 += pts; animateScore('score2'); }
    updateScoreboard();

    // Save answer
    if (sessionId) {
      await sb.from('answers').insert({
        session_id: sessionId,
        question_id: q.id,
        team_answered: team,
        images_shown: shownImages,
        points_awarded: pts
      });
    }

    showResult(true, team, pts);
  } else {
    showToast(`❌ إجابة خاطئة!`, 'wrong');
    document.getElementById('answer-input').value = '';
    document.getElementById('team-btns').style.display = 'none';
    pendingAnswer = '';
    startTimer();
  }
}

function animateScore(id) {
  const el = document.getElementById(id);
  el.classList.remove('score-bump');
  void el.offsetWidth;
  el.classList.add('score-bump');
  setTimeout(() => el.classList.remove('score-bump'), 600);
}

function updateScoreboard() {
  document.getElementById('score-name1').textContent = game.team1;
  document.getElementById('score-name2').textContent = game.team2;
  document.getElementById('score1').textContent = game.score1;
  document.getElementById('score2').textContent = game.score2;
}

// ===== RESULT POPUP =====
function showResult(correct, team, pts) {
  const teamName = team === 1 ? game.team1 : game.team2;
  const color = team === 1 ? 'var(--team1)' : 'var(--team2)';
  const q = questions[currentIndex];

  const overlay = document.createElement('div');
  overlay.className = 'result-overlay';
  overlay.innerHTML = `
    <div class="result-card">
      <span class="result-emoji">🎉</span>
      <div class="result-title" style="color:${color}">${teamName}</div>
      <div class="result-sub">أجاب صح! الإجابة: <strong style="color:var(--gold)">${q.answer}</strong></div>
      <span class="result-points">+${pts}</span>
      <button class="btn-next" onclick="nextQuestion(this.closest('.result-overlay'))">السؤال التالي ←</button>
    </div>
  `;
  document.body.appendChild(overlay);
  confetti();
}

function nextQuestion(overlay) {
  overlay.remove();
  currentIndex++;
  loadQuestion();
}

// ===== SKIP QUESTION =====
function skipQuestion() {
  clearInterval(timerInterval);
  const q = questions[currentIndex];

  // Reveal all images
  for (let i = 0; i < 4; i++) revealImage(i);

  const overlay = document.createElement('div');
  overlay.className = 'result-overlay';
  overlay.innerHTML = `
    <div class="result-card skipped">
      <span class="result-emoji-skip">🤔</span>
      <div class="result-title" style="color:#ff6b35">انتهى الوقت!</div>
      <div class="result-sub">لم يُجب أحد على هذا السؤال</div>
      <div class="skip-answer-reveal">
        <div class="skip-answer-label">الإجابة الصحيحة كانت</div>
        <div class="skip-answer-text">${q.answer}</div>
      </div>
      <button class="btn-next" onclick="nextQuestion(this.closest('.result-overlay'))">السؤال التالي ←</button>
    </div>
  `;
  document.body.appendChild(overlay);
}

// ===== END GAME =====
async function endGame() {
  clearInterval(timerInterval);

  if (sessionId) {
    await sb.from('game_sessions').update({
      team1_score: game.score1,
      team2_score: game.score2,
      status: 'finished'
    }).eq('id', sessionId);
  }

  let winner;
  if (game.score1 > game.score2) winner = game.team1;
  else if (game.score2 > game.score1) winner = game.team2;
  else winner = 'تعادل! 🤝';

  document.getElementById('winner-name').textContent = winner;
  document.getElementById('final-name1').textContent = game.team1;
  document.getElementById('final-name2').textContent = game.team2;
  document.getElementById('final-pts1').textContent = game.score1;
  document.getElementById('final-pts2').textContent = game.score2;

  if (game.score1 > game.score2) document.getElementById('final-card1').classList.add('winner');
  else if (game.score2 > game.score1) document.getElementById('final-card2').classList.add('winner');

  showScreen('final-screen');
  setTimeout(confetti, 300);
  setTimeout(confetti, 700);
}

function resetGame() {
  game.score1 = 0;
  game.score2 = 0;
  currentIndex = 0;
  sessionId = null;
  questions = shuffle(questions);
  showScreen('setup-screen');
}

// ===== TOAST =====
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 2500);
}

// ===== CONFETTI =====
function confetti() {
  const colors = ['#f5c842', '#00d4ff', '#ff4d6d', '#00e676', '#ffffff'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random() * 100}vw;
      top: -10px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      width: ${6 + Math.random() * 8}px;
      height: ${6 + Math.random() * 8}px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      animation-duration: ${2 + Math.random() * 2}s;
      animation-delay: ${Math.random() * 0.5}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

init();
</script>
</body>
</html>
